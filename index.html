<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HTML5 Video Controller</title>
</head>
<body>
	<div class="header">
		<h4 class="center">html5 video controller</h4>
	</div>
	<div class="container">
		<button class="btn" id="rewindBtn">rewind</button>
		<div class="input-container">
			<select name="increment" id="incr"/>
			  <option value="5">5</option>
			  <option value="10">10</option>
			  <option value="15">15</option>
			  <option value="30">30</option>
			  <option value="60">60</option>
			  <option value="360">360</option>
			  <option value="600">600</option>
			  <option value="1800">1800</option>
			</select>
			<label>sec</label>
		</div>
		<button class="btn" id="fastFwdBtn">fast forward</button>
	</div>
	<div class="container">
		<button class="btn" id="goToEndBtn">go to end</button>
	</div>
	<br>
	<div class="container">
		<button class="btn" id="slowerBtn">playback speed -</button>
		<button class="btn" id="fasterBtn">playback speed +</button>
	</div>
	<div class="container">
		<button class="btn" id="normalSpeedBtn">normal speed</button>
	</div>
	<script defer src="popup.js"></script>
</body>
</html>
