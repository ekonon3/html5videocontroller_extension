<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HTML5 Video Controller</title>
</head>
<body>
	<div class="header">
		<h4 class="center">html5 video controller</h4>
	</div>
	<div class="container center">
			<button class="btn smaller" id="selectVideoBtn" title=
			"Optionally manually select a video to control (click or right click on video to select)&#x000A;&#9;&#9;Note: May not work if there is an overlay layer above the video">select video</button>
	</div>
	<div class="container center">
		<button class="btn symbol-small" id="goToStartBtn">&#x23EE; start</button>
		<button class="btn symbol-small" id="goToEndBtn">end &#x23ED;</button>
	</div>
	<div class="container center">
		<button class="btn smaller symbol" id="playBtn">&#x23F5;&#x23F8;</button>
	</div>
	<div class="container center">
		<button class="btn smaller symbol" id="rewindBtn">&#x23EA;&#xfe0e;</button>
		<div class="input-container">
			<select name="increment" id="incr"/>
			  <option value="5">5</option>
			  <option value="10">10</option>
			  <option value="15">15</option>
			  <option value="30">30</option>
			  <option value="60">60</option>
			  <option value="360">360</option>
			  <option value="600">600</option>
			  <option value="1800">1800</option>
			</select>
			<label>sec</label>
		</div>
		<button class="btn smaller symbol" id="fastFwdBtn" title="Fast-forward">&#x23E9;&#xfe0e;</button>
	</div>
	<br>
	<div class="container center">
		<button class="btn larger" id="slowerBtn">&ShortDownArrow; playback speed</button>
		<div class="speed" id="playback-speed">1x</div>
		<button class="btn larger" id="fasterBtn">&ShortUpArrow; playback speed</button>
	</div>
	<div class="container center">
		<button class="btn smaller" id="normalSpeedBtn">normal speed</button>
	</div>
	<div class="container space-between top-margin">
		<div class="inner-container">
			<button class="btn smallest symbol mute" id="toggleMuteBtn" title="Mute">&#x1F50A;&#xfe0e;</button>
			<input type="range" min="0" max="100" value="100" class="slider" id="volumeSlider">
		</div>
		<div class="inner-container">
			<button class="btn smallest symbol" id="toggleFullScreenBtn" title="Full screen">&#x26F6;</button>
			<button class="btn smallest symbol" id="togglePiPBtn" title="PiP (Picture in Picture)">&#x25F2;</button>
		</div>
	</div>
	<script defer src="popup.js"></script>
</body>
</html>
