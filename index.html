<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HTML5 Video Controller</title>
</head>
<body>
	<div class="header">
		<h4 class="center">html5 video controller</h4>
	</div>
	<div class="container center">
		<button class="btn smaller play" id="playBtn">&#x23F5;&#x23F8;</button>
	</div>
	<div class="container center">
		<button class="btn larger" id="rewindBtn">&larr; rewind</button>
		<div class="input-container">
			<select name="increment" id="incr"/>
			  <option value="5">5</option>
			  <option value="10">10</option>
			  <option value="15">15</option>
			  <option value="30">30</option>
			  <option value="60">60</option>
			  <option value="360">360</option>
			  <option value="600">600</option>
			  <option value="1800">1800</option>
			</select>
			<label>sec</label>
		</div>
		<button class="btn larger" id="fastFwdBtn">fast forward &rarr;</button>
	</div>
	<div class="container center">
		<button class="btn smaller" id="goToStartBtn">go to start</button>
		<button class="btn smaller" id="goToEndBtn">go to end</button>
	</div>
	<br>
	<div class="container center">
		<button class="btn larger" id="slowerBtn">&ShortDownArrow; playback speed</button>
		<div class="speed" id="playback-speed">1x</div>
		<button class="btn larger" id="fasterBtn">&ShortUpArrow; playback speed</button>
	</div>
	<div class="container center">
		<button class="btn larger" id="normalSpeedBtn">normal speed</button>
	</div>
	<div class="container right">
		<button class="btn smallest right" id="togglePiPBtn">&#x25F2; PiP</button>
	</div>
	<script defer src="popup.js"></script>
</body>
</html>
